<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>服务器配置 - ACF上线过账系统</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 12px;
      padding: 30px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    }
    h1 {
      text-align: center;
      color: #333;
      margin-bottom: 10px;
      font-size: 24px;
    }
    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 30px;
      font-size: 14px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      color: #333;
      font-weight: 500;
    }
    input {
      width: 100%;
      padding: 12px 15px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 16px;
      transition: border-color 0.3s;
    }
    input:focus {
      outline: none;
      border-color: #667eea;
    }
    .hint {
      font-size: 12px;
      color: #999;
      margin-top: 5px;
    }
    button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
    }
    button:active {
      transform: translateY(0);
    }
    .error {
      color: #e74c3c;
      font-size: 14px;
      text-align: center;
      margin-top: 15px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>⚙️ 服务器配置</h1>
    <p class="subtitle">首次使用，请配置服务器地址</p>
    
    <div class="form-group">
      <label for="serverUrl">服务器地址</label>
      <input type="text" id="serverUrl" placeholder="https://10.201.2.40:3002" value="https://10.201.2.40:3002">
      <p class="hint">请输入完整的服务器地址，包含 http:// 或 https://</p>
    </div>
    
    <button onclick="saveConfig()">保存并继续</button>
    <p id="error" class="error"></p>
  </div>

  <script>
    const { ipcRenderer } = require('electron');
    
    async function saveConfig() {
      const serverUrl = document.getElementById('serverUrl').value.trim();
      const errorEl = document.getElementById('error');
      
      if (!serverUrl) {
        errorEl.textContent = '请输入服务器地址';
        return;
      }
      
      if (!serverUrl.startsWith('http://') && !serverUrl.startsWith('https://')) {
        errorEl.textContent = '服务器地址必须以 http:// 或 https:// 开头';
        return;
      }
      
      try {
        errorEl.textContent = '正在测试连接...';
        
        const response = await fetch(`${serverUrl}/api/ping`, {
          method: 'GET',
          headers: { 'Content-Type': 'application/json' }
        });
        
        if (!response.ok) {
          throw new Error('连接失败');
        }
        
        const data = await response.json();
        
        if (data.success) {
          await ipcRenderer.invoke('save-config', { serverUrl });
          errorEl.textContent = '';
          errorEl.style.color = '#27ae60';
          errorEl.textContent = '✅ 连接成功！正在跳转...';
          
          setTimeout(() => {
            ipcRenderer.invoke('login-success', null);
          }, 1000);
        } else {
          throw new Error(data.message || '连接失败');
        }
      } catch (err) {
        errorEl.style.color = '#e74c3c';
        errorEl.textContent = '连接失败: ' + err.message;
      }
    }
    
    document.getElementById('serverUrl').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        saveConfig();
      }
    });
  </script>
</body>
</html>
