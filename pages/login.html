<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - ACF上线过账系统</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 12px;
      padding: 30px;
      width: 100%;
      max-width: 350px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    }
    h1 {
      text-align: center;
      color: #333;
      margin-bottom: 10px;
      font-size: 24px;
    }
    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 30px;
      font-size: 14px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      color: #333;
      font-weight: 500;
    }
    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 12px 15px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 16px;
      transition: border-color 0.3s;
    }
    input:focus {
      outline: none;
      border-color: #667eea;
    }
    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 20px;
    }
    .checkbox-group input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
    }
    .checkbox-group label {
      margin: 0;
      cursor: pointer;
      font-size: 14px;
    }
    button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
    }
    button:active {
      transform: translateY(0);
    }
    .error {
      color: #e74c3c;
      font-size: 14px;
      text-align: center;
      margin-top: 15px;
    }
    .change-server {
      text-align: center;
      margin-top: 20px;
    }
    .change-server a {
      color: #667eea;
      text-decoration: none;
      font-size: 14px;
    }
    .change-server a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔐 用户登录</h1>
    <p class="subtitle">登录用于记录操作者</p>
    
    <div class="form-group">
      <label for="username">用户名</label>
      <input type="text" id="username" placeholder="请输入用户名">
    </div>
    
    <div class="form-group">
      <label for="password">密码</label>
      <input type="password" id="password" placeholder="请输入密码">
    </div>
    
    <div class="checkbox-group">
      <input type="checkbox" id="rememberMe">
      <label for="rememberMe">记住我（下次自动登录）</label>
    </div>
    
    <button onclick="login()">登录</button>
    <p id="error" class="error"></p>
    
    <div class="change-server">
      <a href="#" onclick="changeServer()">更换服务器地址</a>
    </div>
  </div>

  <script>
    const { ipcRenderer } = require('electron');
    let config = {};
    
    async function init() {
      config = await ipcRenderer.invoke('get-config');
      
      if (config.user && config.rememberMe) {
        document.getElementById('username').value = config.user.username || '';
        document.getElementById('rememberMe').checked = true;
      }
      
      document.getElementById('username').focus();
    }
    
    async function login() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const rememberMe = document.getElementById('rememberMe').checked;
      const errorEl = document.getElementById('error');
      
      if (!username || !password) {
        errorEl.textContent = '请输入用户名和密码';
        return;
      }
      
      try {
        errorEl.textContent = '正在登录...';
        
        const response = await fetch(`${config.serverUrl}/api/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        
        const data = await response.json();
        
        if (data.success) {
          await ipcRenderer.invoke('save-config', { 
            user: data.user, 
            rememberMe 
          });
          errorEl.textContent = '';
          await ipcRenderer.invoke('login-success', data.user);
        } else {
          errorEl.textContent = data.message || '登录失败';
        }
      } catch (err) {
        errorEl.textContent = '登录失败: ' + err.message;
      }
    }
    
    async function changeServer() {
      await ipcRenderer.invoke('change-server');
    }
    
    document.getElementById('password').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        login();
      }
    });
    
    init();
  </script>
</body>
</html>
